; Mirrors the non-default settings used in Fresha app-pgbouncer (deploy-multi/*/values.yaml)
; so the comparison against pgdog reflects production-shaped config, not toy defaults.

[databases]
appdb = host=postgres port=5432 dbname=appdb auth_user=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6433
unix_socket_dir =
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 3000
default_pool_size = 1000
min_pool_size = 10
max_prepared_statements = 1500
ignore_startup_parameters = extra_float_digits
server_idle_timeout = 60
query_timeout = 10
idle_transaction_timeout = 5
tcp_keepalive = 1
tcp_keepidle = 300
tcp_keepintvl = 30
tcp_keepcnt = 2
admin_users = postgres
stats_users = postgres
